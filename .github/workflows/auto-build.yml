name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: "patch"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    if: contains(github.event.head_commit.message, '!release') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump version
        id: bump
        env:
          EVENT_NAME: ${{ github.event_name }}
          VERSION_INPUT: ${{ github.event.inputs.version_type }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RELEASE_TYPE="${VERSION_INPUT:-patch}"
          else
            RELEASE_TYPE=$(echo "$COMMIT_MSG" | grep -oP '!release:\s*\K(major|minor|patch)' || echo "patch")
          fi

          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          LAST_TAG=$(git tag --sort=-v:refname | head -n1)
          LAST_VERSION=${LAST_TAG#v}
          LAST_VERSION=${LAST_VERSION:-0.0.0}

          cd desktop
          npm version "$LAST_VERSION" --no-git-tag-version --allow-same-version
          npm version "$RELEASE_TYPE" --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          cd ..

          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" desktop/src-tauri/tauri.conf.json
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" desktop/src-tauri/Cargo.toml

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          if ! git diff --quiet; then
            git add desktop/package.json desktop/src-tauri/tauri.conf.json desktop/src-tauri/Cargo.toml
            git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
            git push origin HEAD:main
          fi

  docker:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/backend:${{ needs.version.outputs.version }}
            ghcr.io/${{ steps.repo.outputs.name }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            job_name: linux-amd64
          - platform: ubuntu-22.04-arm
            args: ""
            job_name: linux-arm64
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            job_name: macos-arm64
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            job_name: macos-amd64
          - platform: windows-latest
            args: ""
            job_name: windows-amd64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: git pull origin main

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils libasound2-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-builds-${{ matrix.job_name }}
          path: |
            desktop/src-tauri/target/**/release/bundle/deb/*.deb
            desktop/src-tauri/target/**/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/**/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/**/release/bundle/nsis/*.exe
            desktop/src-tauri/target/**/release/bundle/msi/*.msi
            desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/**/release/bundle/macos/*.tar.gz
          retention-days: 2

  flatpak:
    needs: version
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git pull origin main

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install flatpak-builder-tools
        run: |
          git clone --depth=1 https://github.com/flatpak/flatpak-builder-tools.git /tmp/fbt
          pip3 install --root-user-action=ignore --break-system-packages --prefix=/app tomlkit
          pip3 install --root-user-action=ignore --break-system-packages --prefix=/app /tmp/fbt/node

      - name: Generate offline sources
        run: |
          cd desktop && npm install --package-lock-only --legacy-peer-deps && cd ..
          flatpak-node-generator npm desktop/package-lock.json -o .github/flatpak/node-sources.json
          python3 /tmp/fbt/cargo/flatpak-cargo-generator.py desktop/src-tauri/Cargo.lock -o .github/flatpak/cargo-sources.json

      - name: Fetch Flathub shared-modules
        run: git clone --depth=1 https://github.com/flathub/shared-modules.git .github/flatpak/shared-modules

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: .github/flatpak/io.github.zxcloli666.SoundcloudDesktop.yml
          bundle: soundcloud-desktop.flatpak

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: soundcloud-desktop.flatpak

  release:
    needs: [version, build, docker, flatpak]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
          pattern: '{tauri-builds-*,linux-flatpak,soundcloud-desktop-*.flatpak}'
          merge-multiple: true

      - name: Flatten and deduplicate artifacts
        run: |
          mkdir -p /tmp/release
          find /tmp/artifacts -type f | while read -r f; do
            name=$(basename "$f")
            case "$f" in
              *aarch64-apple-darwin*.app.tar.gz) name="${name%.app.tar.gz}_arm64.app.tar.gz" ;;
              *x86_64-apple-darwin*.app.tar.gz)  name="${name%.app.tar.gz}_x64.app.tar.gz" ;;
            esac
            cp "$f" "/tmp/release/$name"
          done
          ls -la /tmp/release/

      - name: Publish release
        uses: zxcloli666/release-helper@main
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TYPE: ${{ github.event.inputs.version_type }}
          BUILD_COMMAND: "echo 'skip'"
          ASSET_PATTERNS: "/tmp/release/*"
          OPENAI_API_BASE_URL: ${{ secrets.AI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.AI_API_KEY }}
          OPENAI_API_MODEL: deep-think
          LANGUAGE: "РУССКИЙ"